<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheckCheck - Presença</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>CheckCheck</h1>
      <p class="subtitle">Presença em tempo real</p>

      <section class="card total-card">
        <h2>Total no escritório</h2>
        <div id="totalPresentes" class="big-number">0</div>
      </section>

      <section class="card">
        <h2>Pessoas presentes</h2>
        <ul id="presentesList" class="present-list"></ul>
      </section>

      <section class="card">
        <h2>Registros (checkcheck)</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome completo</th>
                <th>Matrícula</th>
                <th>Chave</th>
                <th>Data/hora (SGT)</th>
                <th>Entrada</th>
                <th>RFID UID</th>
                <th>Leitor</th>
              </tr>
            </thead>
            <tbody id="registrosTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
  </html>
