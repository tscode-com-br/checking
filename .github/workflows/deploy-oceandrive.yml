name: Deploy OceanDrive

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-oceandrive-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync project to server
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: >-
            -avzr --delete
            --exclude ".git/"
            --exclude ".github/"
            --exclude ".venv/"
            --exclude "*.db"
            --exclude "deploy/keys/"
            --exclude ".env"
          path: ./
          remote_path: ${{ secrets.OCEAN_APP_DIR }}
          remote_host: ${{ secrets.OCEAN_HOST }}
          remote_user: ${{ secrets.OCEAN_USER }}
          remote_key: ${{ secrets.OCEAN_SSH_KEY }}
          remote_port: ${{ secrets.OCEAN_PORT || 22 }}

      - name: Rebuild and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ secrets.OCEAN_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.OCEAN_APP_DIR }}
            if [ ! -f .env ]; then
              echo "Arquivo .env nao encontrado em ${{ secrets.OCEAN_APP_DIR }}"
              exit 1
            fi
            docker compose up -d --build
            docker image prune -f
