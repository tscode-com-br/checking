<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Checking Transport</title>
    <base href="./transport/" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/site_icon.png?v=1" />
    <link rel="shortcut icon" type="image/png" href="/assets/img/site_icon.png?v=1" />
    <link rel="apple-touch-icon" href="/assets/img/site_icon.png?v=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="tela00" class="tela00">
      <section id="tela01" class="tela01" aria-label="Transport layout">
        <section id="tela01menu" class="tela01menu" aria-label="Transport quick actions">
          <div class="transport-topbar-copy">
            <span class="transport-topbar-kicker">Checking Transport</span>
            <strong class="transport-topbar-title">Allocation board</strong>
          </div>
          <div class="transport-topbar-status" data-status-message hidden></div>
        </section>
        <div
          class="transport-divider transport-divider-horizontal transport-divider-resizable"
          data-resize="horizontal"
          data-min-first="50"
          data-min-second="180"
          role="separator"
          aria-label="Resize menu and main area"
          aria-orientation="horizontal"
        ></div>

        <section id="tela01principal" class="tela01main" aria-label="Transport main panels">
          <div class="transport-main-toolbar" data-date-panel aria-label="Selected service date">
            <div class="transport-date-stack transport-main-date-stack">
              <div class="transport-date-row transport-main-date-row">
                <button
                  type="button"
                  class="transport-nav-button"
                  data-date-shift="-1"
                  aria-label="Previous service date"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15 18 9 12l6-6" />
                  </svg>
                </button>
                <a href="#" class="transport-date-link" data-date-link aria-label="Return service date to today">
                  <span class="transport-date-label" data-date-label>--</span>
                </a>
                <button
                  type="button"
                  class="transport-nav-button"
                  data-date-shift="1"
                  aria-label="Next service date"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m9 18 6-6-6-6" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <section id="tela01main_esq" class="transport-pane transport-pane-single">
            <div class="transport-pane-head">
              <h1 class="transport-pane-title">User List</h1>
            </div>

            <div class="transport-selection-banner" data-selection-banner hidden>
              <div class="transport-selection-copy">
                <span class="transport-selection-label">Selected Request</span>
                <strong class="transport-selection-value" data-selection-text>--</strong>
              </div>
              <div class="transport-selection-actions">
                <button type="button" class="transport-selection-reject" data-reject-selection>Reject Selected</button>
                <button type="button" class="transport-selection-clear" data-clear-selection>Clear</button>
              </div>
            </div>

            <div class="transport-request-sections">
              <section class="transport-request-section" aria-label="Extra car requests">
                <div class="transport-section-head">
                  <h2 class="transport-section-title">Extra Car Requests</h2>
                </div>
                <div class="transport-request-table" data-request-kind="extra"></div>
              </section>

              <section class="transport-request-section" aria-label="Weekend car requests">
                <div class="transport-section-head">
                  <h2 class="transport-section-title">Weekend Car Requests</h2>
                </div>
                <div class="transport-request-table" data-request-kind="weekend"></div>
              </section>

              <section class="transport-request-section" aria-label="Regular car requests">
                <div class="transport-section-head">
                  <h2 class="transport-section-title">Regular Car Requests</h2>
                </div>
                <div class="transport-request-table" data-request-kind="regular"></div>
              </section>
            </div>
          </section>

          <div
            class="transport-divider transport-divider-vertical transport-divider-resizable"
            data-resize="vertical"
            data-min-first="180"
            data-min-second="180"
            role="separator"
            aria-label="Resize left and right columns"
            aria-orientation="vertical"
          ></div>

          <section id="tela01main_dir" class="tela01main_dir" aria-label="Transport car panels">
            <section id="tela01main_dir_up" class="transport-pane">
              <div class="transport-pane-head">
                <div class="transport-pane-title-row">
                  <h2 class="transport-pane-title">Regular Car List</h2>
                  <button type="button" class="transport-add-button" data-open-vehicle-modal="regular" aria-label="Add regular vehicle">+</button>
                </div>
              </div>
              <div class="transport-vehicle-grid" data-vehicle-scope="regular"></div>
            </section>

            <div
              class="transport-divider transport-divider-horizontal transport-divider-resizable"
              data-resize="horizontal"
              data-min-first="140"
              data-min-second="140"
              role="separator"
              aria-label="Resize regular and weekend car areas"
              aria-orientation="horizontal"
            ></div>

            <section id="tela01main_dir_mid" class="transport-pane">
              <div class="transport-pane-head">
                <div class="transport-pane-title-row">
                  <h2 class="transport-pane-title">Weekend Car List</h2>
                </div>
              </div>
              <div class="transport-vehicle-grid" data-vehicle-scope="weekend"></div>
            </section>

            <div
              class="transport-divider transport-divider-horizontal transport-divider-resizable"
              data-resize="horizontal"
              data-min-first="160"
              data-min-second="120"
              role="separator"
              aria-label="Resize weekend and extra car areas"
              aria-orientation="horizontal"
            ></div>

            <section id="tela01main_dir_down" class="transport-pane">
              <div class="transport-pane-head">
                <div class="transport-pane-title-row">
                  <h2 class="transport-pane-title">Extra Car List</h2>
                  <button type="button" class="transport-add-button" data-open-vehicle-modal="extra" aria-label="Add extra vehicle">+</button>
                </div>
              </div>
              <div class="transport-vehicle-grid" data-vehicle-scope="extra"></div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <div class="transport-modal-backdrop" data-vehicle-modal hidden>
      <div class="transport-modal" role="dialog" aria-modal="true" aria-labelledby="transport-vehicle-modal-title">
        <div class="transport-modal-head">
          <div>
            <span class="transport-modal-kicker" data-modal-scope-label>Regular</span>
            <h2 id="transport-vehicle-modal-title" class="transport-modal-title">Create Vehicle</h2>
          </div>
          <button type="button" class="transport-modal-close" data-close-vehicle-modal aria-label="Close vehicle form">×</button>
        </div>

        <form class="transport-modal-form" data-vehicle-form>
          <input type="hidden" name="service_scope" value="regular" />

          <label class="transport-field">
            <span>Type</span>
            <select name="tipo" required>
              <option value="carro">Car</option>
              <option value="minivan">Mini-Van</option>
              <option value="van">Van</option>
              <option value="onibus">Bus</option>
            </select>
          </label>

          <label class="transport-field">
            <span>Plate</span>
            <input type="text" name="placa" maxlength="9" autocomplete="off" required />
          </label>

          <label class="transport-field">
            <span>Color</span>
            <input type="text" name="color" maxlength="40" autocomplete="off" required />
          </label>

          <label class="transport-field">
            <span>Places</span>
            <input type="number" name="lugares" min="1" max="99" required />
          </label>

          <label class="transport-field">
            <span>Tolerance (minutes)</span>
            <input type="number" name="tolerance" min="0" max="240" required />
          </label>

          <div class="transport-modal-actions">
            <button type="button" class="transport-secondary-button" data-close-vehicle-modal>Cancel</button>
            <button type="submit" class="transport-primary-button">Save Vehicle</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
