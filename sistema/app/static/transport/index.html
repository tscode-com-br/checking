<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Checking Transport</title>
    <base href="./transport/" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/site_icon.png?v=1" />
    <link rel="shortcut icon" type="image/png" href="/assets/img/site_icon.png?v=1" />
    <link rel="apple-touch-icon" href="/assets/img/site_icon.png?v=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="tela00" class="tela00">
      <section id="tela01" class="tela01" aria-label="Transport layout">
        <section id="tela01menu" class="tela01menu" aria-hidden="true"></section>
        <div class="transport-divider transport-divider-horizontal" aria-hidden="true"></div>

        <section id="tela01principal" class="tela01main" aria-label="Transport main panels">
          <section id="tela01main_esq" class="transport-pane transport-pane-single" data-date-panel>
            <div class="transport-pane-head">
              <h1 class="transport-pane-title">User List</h1>
              <div class="transport-date-stack">
                <div class="transport-date-row">
                  <button
                    type="button"
                    class="transport-nav-button"
                    data-date-shift="-1"
                    aria-label="Previous day for User List"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M15 18 9 12l6-6" />
                    </svg>
                  </button>
                  <p class="transport-date-label" data-date-label>--</p>
                  <button
                    type="button"
                    class="transport-nav-button"
                    data-date-shift="1"
                    aria-label="Next day for User List"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m9 18 6-6-6-6" />
                    </svg>
                  </button>
                </div>
                <button type="button" class="transport-today-button" data-date-today>Today</button>
              </div>
            </div>
          </section>

          <div class="transport-divider transport-divider-vertical" aria-hidden="true"></div>

          <section id="tela01main_dir" class="tela01main_dir" aria-label="Transport car panels">
            <section id="tela01main_dir_up" class="transport-pane" data-date-panel>
              <div class="transport-pane-head">
                <h2 class="transport-pane-title">Regular Car List</h2>
                <div class="transport-date-stack">
                  <div class="transport-date-row">
                    <button
                      type="button"
                      class="transport-nav-button"
                      data-date-shift="-1"
                      aria-label="Previous day for Regular Car List"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 18 9 12l6-6" />
                      </svg>
                    </button>
                    <p class="transport-date-label" data-date-label>--</p>
                    <button
                      type="button"
                      class="transport-nav-button"
                      data-date-shift="1"
                      aria-label="Next day for Regular Car List"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m9 18 6-6-6-6" />
                      </svg>
                    </button>
                  </div>
                  <button type="button" class="transport-today-button" data-date-today>Today</button>
                </div>
              </div>
            </section>

            <div class="transport-divider transport-divider-horizontal" aria-hidden="true"></div>

            <section id="tela01main_dir_down" class="transport-pane" data-date-panel>
              <div class="transport-pane-head">
                <h2 class="transport-pane-title">Extra Car List</h2>
                <div class="transport-date-stack">
                  <div class="transport-date-row">
                    <button
                      type="button"
                      class="transport-nav-button"
                      data-date-shift="-1"
                      aria-label="Previous day for Extra Car List"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 18 9 12l6-6" />
                      </svg>
                    </button>
                    <p class="transport-date-label" data-date-label>--</p>
                    <button
                      type="button"
                      class="transport-nav-button"
                      data-date-shift="1"
                      aria-label="Next day for Extra Car List"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m9 18 6-6-6-6" />
                      </svg>
                    </button>
                  </div>
                  <button type="button" class="transport-today-button" data-date-today>Today</button>
                </div>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
