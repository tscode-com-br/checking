<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Checking Mobile Web</title>
    <base href="./user/" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/site_icon.png?v=1" />
    <link rel="shortcut icon" type="image/png" href="/assets/img/site_icon.png?v=1" />
    <link rel="apple-touch-icon" href="/assets/img/site_icon.png?v=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-brand" role="img" aria-label="Checking">
        <svg class="header-logo-icon" viewBox="0 0 220 170" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
            <g transform="translate(18 16) rotate(-12 74 70)">
              <rect x="12" y="8" width="120" height="120" rx="18" stroke-width="10" />
              <rect x="28" y="30" width="34" height="28" rx="4" fill="#ffffff" stroke="none" />
              <path d="M28 74H64" stroke-width="10" />
              <path d="M28 96H56" stroke-width="10" />
              <path d="M92 78L118 104L162 44" stroke-width="20" />
              <path d="M154 30C167 34 176 43 180 56" stroke-width="8" />
              <path d="M166 18C184 24 197 38 202 56" stroke-width="8" />
            </g>
          </g>
        </svg>
        <span class="header-logo-text">Checking</span>
      </div>
    </header>

    <main class="check-shell">
      <section class="check-card" aria-label="Formulário de registro de check-in e check-out">

        <form
          id="checkForm"
          class="check-form"
          novalidate
          data-submit-endpoint="/api/web/check"
          data-state-endpoint="/api/web/check/state"
          data-locations-endpoint="/api/web/check/locations"
          data-location-endpoint="/api/web/check/location"
        >
          <section class="history-card" aria-labelledby="historyTitle">
            <div class="history-grid">
              <div class="history-item">
                <p id="historyTitle" class="history-label">Último Check-In</p>
                <p id="lastCheckinValue" class="history-value">--</p>
              </div>
              <div class="history-item">
                <p class="history-label">Último Check-Out</p>
                <p id="lastCheckoutValue" class="history-value">--</p>
              </div>
            </div>
          </section>

          <section class="notification-card" aria-live="polite" aria-atomic="true">
            <p id="notificationLinePrimary" class="notification-line"></p>
            <p id="notificationLineSecondary" class="notification-line"></p>
          </section>

          <section class="location-card" aria-labelledby="locationTitle">
            <div class="location-card-header">
              <p id="locationTitle" class="history-label">Local</p>
              <p id="locationAccuracy" class="location-accuracy">--</p>
            </div>
            <div class="location-main-row">
              <p id="locationValue" class="location-value">Aguardando localização.</p>
              <button
                id="refreshLocationButton"
                type="button"
                class="location-refresh-button"
                aria-label="Atualizar localização"
                title="Atualizar localização"
              >
                <svg class="location-refresh-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M20 11a8 8 0 1 0 2 5.29"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                  />
                  <path
                    d="M20 4v7h-7"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                  />
                </svg>
                <span class="visually-hidden">Atualizar localização</span>
              </button>
            </div>
          </section>

          <label class="check-field" for="chaveInput">
            <span>Chave Petrobras</span>
            <input
              id="chaveInput"
              name="chave"
              type="text"
              inputmode="text"
              autocomplete="username"
              maxlength="4"
              placeholder="Ex.: HR70"
              required
            />
          </label>

          <fieldset class="check-group">
            <legend class="check-group-legend-row">
              <span>Registro</span>
              <label class="legend-toggle" for="automaticActivitiesToggle">
                <span class="legend-toggle-label">Atividades Automáticas</span>
                <input id="automaticActivitiesToggle" type="checkbox" />
              </label>
            </legend>
            <div class="choice-grid three-columns">
              <label class="choice-card">
                <input type="radio" name="action" value="checkin" checked />
                <span>Check-In</span>
              </label>
              <label class="choice-card">
                <input type="radio" name="action" value="checkout" />
                <span>Check-Out</span>
              </label>
              <button type="button" class="choice-card choice-card-static" aria-disabled="true">Transporte</button>
            </div>
          </fieldset>

          <fieldset class="check-group">
            <legend>Informe</legend>
            <div class="choice-grid two-columns">
              <label class="choice-card">
                <input type="radio" name="informe" value="normal" checked />
                <span>Normal</span>
              </label>
              <label class="choice-card">
                <input type="radio" name="informe" value="retroativo" />
                <span>Retroativo</span>
              </label>
            </div>
          </fieldset>

          <div class="form-row">
            <label id="projectField" class="check-field check-field-compact" for="projectSelect">
              <span>Projeto</span>
              <select id="projectSelect" name="projeto">
                <option value="P80">P80</option>
                <option value="P82">P82</option>
                <option value="P83">P83</option>
              </select>
            </label>

            <label id="locationSelectField" class="check-field check-field-grow" for="manualLocationSelect">
              <span>Local</span>
              <select id="manualLocationSelect" name="localizacao" disabled>
                <option value="">Carregando locais...</option>
              </select>
            </label>
          </div>

          <button id="submitButton" type="submit" class="submit-button">Registrar</button>
        </form>
      </section>
    </main>

    <script src="automatic-activities.js"></script>
    <script src="web-client-state.js"></script>
    <script src="app.js"></script>
  </body>
</html>
